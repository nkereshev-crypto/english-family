const AVATAR_COLORS = ["#6366f1","#22c55e","#f97316","#ec4899","#06b6d4","#eab308","#a855f7","#ef4444"];

/* ---------------- STATE / STORAGE ---------------- */
const STORE_KEY = "familyEnglishApp_v1";
let state = loadState();
let currentProfileId = null;
let currentLevel = null;
let sessionQueue = [];
let sessionTotalUnique = 0;
let sessionMasterCount = 0;
let sessionDeferredCount = 0;
let sessionCorrect = 0;
let sessionAnswers = 0;
let cardFlipped = false;
let selectedColor = AVATAR_COLORS[0];

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (!parsed.notifTimes) parsed.notifTimes = ["09:00", "12:00", "15:00", "18:00", "21:00"];
      return parsed;
    }
  } catch(e) {}
  return { profiles: [], notifTimes: ["09:00", "12:00", "15:00", "18:00", "21:00"] };
}
function saveState() {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}
function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
}

/* ---------------- NAVIGATION ---------------- */
function goTo(screenId) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(screenId).classList.add("active");
  if (screenId === "screen-profiles") renderProfiles();
  if (screenId === "screen-levels") renderLevels();
  if (screenId === "screen-history") renderHistory();
  if (screenId === "screen-learned") renderLearnedWords();
  if (screenId === "screen-notif-settings") renderNotifSettings();
}

/* ---------------- PROFILES ---------------- */
function renderProfiles() {
  const grid = document.getElementById("profile-grid");
  grid.innerHTML = "";
  state.profiles.forEach(p => {
    const learned = countLearned(p);
    const card = document.createElement("div");
    card.className = "profile-card";
    card.onclick = () => openProfile(p.id);
    card.innerHTML = `
      <div class="avatar" style="background:${p.color}">${p.name.charAt(0).toUpperCase()}</div>
      <div class="profile-name">${escapeHtml(p.name)}</div>
      <div class="profile-meta">${learned} слов выучено</div>
    `;
    grid.appendChild(card);
  });
  const addCard = document.createElement("div");
  addCard.className = "profile-card add-card";
  addCard.onclick = () => openAddProfile();
  addCard.innerHTML = `<div style="font-size:28px;">➕</div><div style="font-size:13px;margin-top:6px;">Добавить</div>`;
  grid.appendChild(addCard);
}
function countLearned(p) {
  let n = 0;
  for (const k in p.progress) if (p.progress[k].score >= 3) n++;
  return n;
}
function openAddProfile() {
  document.getElementById("new-profile-name").value = "";
  selectedColor = AVATAR_COLORS[Math.floor(Math.random()*AVATAR_COLORS.length)];
  const row = document.getElementById("color-row");
  row.innerHTML = "";
  AVATAR_COLORS.forEach(c => {
    const dot = document.createElement("div");
    dot.className = "color-dot" + (c === selectedColor ? " selected" : "");
    dot.style.background = c;
    dot.onclick = () => {
      selectedColor = c;
      row.querySelectorAll(".color-dot").forEach(d => d.classList.remove("selected"));
      dot.classList.add("selected");
    };
    row.appendChild(dot);
  });
  goTo("screen-add-profile");
}
function createProfile() {
  const name = document.getElementById("new-profile-name").value.trim();
  if (!name) { alert("Введите имя"); return; }
  const p = { id: "p" + Date.now(), name, color: selectedColor, progress: {}, streak: 0, lastPracticeDate: null, history: [], totalReviews: 0 };
  state.profiles.push(p);
  saveState();
  goTo("screen-profiles");
}
function deleteCurrentProfile() {
  if (!currentProfileId) return;
  const p = state.profiles.find(x => x.id === currentProfileId);
  if (!p) return;
  if (!confirm(`Удалить профиль "${p.name}"? Весь прогресс будет потерян.`)) return;
  state.profiles = state.profiles.filter(x => x.id !== currentProfileId);
  saveState();
  goTo("screen-profiles");
}
function openProfile(id) {
  currentProfileId = id;
  state.lastActiveProfileId = id;
  saveState();
  goTo("screen-levels");
}

/* ---------------- WORD-OF-THE-DAY REMINDER ---------------- */
// Picks the next not-yet-mastered word for a profile, prioritizing lower
// scores, and never repeating a word until the whole pool has been shown
// once (then it cycles again). Shared by the "Слово дня" widget and the
// local reminder notifications, so across a day nothing repeats twice.
function getAllUnmasteredWords(p) {
  const list = [];
  LEVEL_ORDER.forEach(key => {
    DECKS[key].words.forEach((w, i) => {
      const id = key + "_" + i;
      const prog = p.progress[id] || { score: 0 };
      if (prog.score < 3) list.push({ id, key, word: w, score: prog.score });
    });
  });
  list.sort((a, b) => a.score - b.score);
  return list;
}
function getNextReminderWord(p) {
  const pool = getAllUnmasteredWords(p);
  if (pool.length === 0) return null; // everything mastered!
  if (!p.reminderShown) p.reminderShown = [];
  let candidates = pool.filter(e => !p.reminderShown.includes(e.id));
  if (candidates.length === 0) {
    p.reminderShown = []; // shown the whole pool once — start a new cycle
    candidates = pool;
  }
  const pick = candidates[0];
  p.reminderShown.push(pick.id);
  if (p.reminderShown.length > 1000) p.reminderShown = p.reminderShown.slice(-1000);
  saveState();
  return pick;
}
function getWordOfDay(p) {
  const today = todayStr();
  if (p.wordOfDayDate === today && p.wordOfDayId) {
    const sep = p.wordOfDayId.indexOf("_");
    const key = p.wordOfDayId.slice(0, sep);
    const idx = parseInt(p.wordOfDayId.slice(sep + 1), 10);
    if (DECKS[key] && DECKS[key].words[idx]) {
      return { word: DECKS[key].words[idx], levelTitle: DECKS[key].title };
    }
  }
  const picked = getNextReminderWord(p);
  if (!picked) return null; // all words mastered — nothing left to remind about
  p.wordOfDayDate = today;
  p.wordOfDayId = picked.id;
  saveState();
  return { word: picked.word, levelTitle: DECKS[picked.key].title };
}

/* ---------------- LEVELS ---------------- */
function renderLevels() {
  const p = state.profiles.find(x => x.id === currentProfileId);
  if (!p) { goTo("screen-profiles"); return; }
  document.getElementById("levels-title").textContent = p.name;

  const wodBox = document.getElementById("word-of-day-box");
  const wod = getWordOfDay(p);
  if (wod) {
    const [en, ru] = wod.word;
    wodBox.style.display = "block";
    wodBox.innerHTML = `
      <div style="font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em;">📌 Слово дня · ${escapeHtml(wod.levelTitle)}</div>
      <div style="font-size:22px; font-weight:800; margin-top:4px;">${escapeHtml(en)}</div>
      <div style="font-size:16px; color:var(--accent2); margin-top:2px;">${escapeHtml(ru)}</div>
    `;
  } else {
    wodBox.style.display = "none";
  }

  const totalWords = LEVEL_ORDER.reduce((s,k)=>s+DECKS[k].words.length,0);
  const totalLearned = countLearned(p);
  const statsEl = document.getElementById("levels-stats");
  statsEl.innerHTML = `
    <div class="stat-box"><div class="stat-num">${totalLearned}/${totalWords}</div><div class="stat-label">слов выучено</div></div>
    <div class="stat-box"><div class="stat-num">${p.totalReviews || 0}</div><div class="stat-label">повторений всего</div></div>
    <div class="stat-box"><div class="stat-num">${p.streak || 0}🔥</div><div class="stat-label">дней подряд</div></div>
  `;

  const list = document.getElementById("level-list");
  list.innerHTML = "";
  LEVEL_ORDER.forEach(key => {
    const deck = DECKS[key];
    const words = deck.words;
    let learned = 0;
    words.forEach((w,i) => {
      const id = key+"_"+i;
      if (p.progress[id] && p.progress[id].score >= 3) learned++;
    });
    const pct = Math.round((learned/words.length)*100);
    const isComplete = learned === words.length;
    const card = document.createElement("div");
    card.className = "level-card" + (isComplete ? " active-level" : "");
    card.onclick = () => startSession(key);
    card.innerHTML = `
      <div style="flex:1;">
        <div class="level-title">${isComplete ? "✅ " : ""}${deck.title}</div>
        <div class="level-sub">${deck.sub}</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <div class="level-sub" style="margin-top:6px;">${learned} / ${words.length} слов${isComplete ? " · этап пройден" : ""}</div>
      </div>
    `;
    list.appendChild(card);
  });
}

/* ---------------- FLASHCARD SESSION ---------------- */
function startSession(levelKey) {
  currentLevel = levelKey;
  const p = state.profiles.find(x => x.id === currentProfileId);
  const words = DECKS[levelKey].words;

  // Build weighted queue: unseen and low-score words appear more often
  const entries = words.map((w,i) => {
    const id = levelKey+"_"+i;
    const prog = p.progress[id] || { score: 0 };
    return { id, index: i, word: w, score: prog.score };
  }).filter(e => e.score < 3); // only review not-yet-mastered words

  if (entries.length === 0) {
    sessionQueue = [];
    goTo("screen-done");
    document.getElementById("done-summary").textContent = "Все слова этого уровня уже выучены! 🎓";
    return;
  }

  entries.sort((a,b) => a.score - b.score);
  // cap session size for a manageable practice round; each word must be
  // answered "Знаю" until its score reaches 3, re-appearing within this
  // same session (spaced a few cards apart) until mastered
  sessionQueue = entries.slice(0, 15);
  sessionQueue.forEach(e => e.attempts = 0);
  sessionTotalUnique = sessionQueue.length;
  sessionMasterCount = 0;
  sessionDeferredCount = 0;
  sessionCorrect = 0;
  sessionAnswers = 0;
  goTo("screen-cards");
  showCurrentCard();
}

function showCurrentCard() {
  if (sessionQueue.length === 0) {
    finishSession();
    return;
  }
  const entry = sessionQueue[0];
  const [en, ru, exEn, exRu] = entry.word;
  const hasExample = !!exEn;
  document.getElementById("flash-word").textContent = en;
  document.getElementById("flash-translation").textContent = ru;
  document.getElementById("flash-example").innerHTML = hasExample ? `<em>${exEn}</em><br>${exRu}` : "";
  document.getElementById("flash-badge").textContent = DECKS[currentLevel].title.split(" ")[0];
  document.getElementById("session-progress-top").textContent = `${sessionMasterCount} / ${sessionTotalUnique} выучено`;
  cardFlipped = false;
  document.getElementById("flash-translation").style.display = "none";
  document.getElementById("flash-example").style.display = "none";
  document.getElementById("flash-hint").style.display = "block";
  document.getElementById("flash-hint-next").style.display = "none";
  document.getElementById("review-actions").style.display = "none";
}
function flipCard() {
  if (!cardFlipped) {
    // first tap: reveal translation
    cardFlipped = true;
    document.getElementById("flash-translation").style.display = "block";
    const exampleEl = document.getElementById("flash-example");
    exampleEl.style.display = exampleEl.innerHTML ? "block" : "none";
    document.getElementById("flash-hint").style.display = "none";
    document.getElementById("flash-hint-next").style.display = "block";
    document.getElementById("review-actions").style.display = "flex";
  } else {
    // second tap on the word/card: count as "knew it" and move to the next card
    answerCard(true);
  }
}
const MAX_ATTEMPTS_PER_WORD = 8; // safety cap so one stubborn word can't stall a session forever

function answerCard(knew) {
  const p = state.profiles.find(x => x.id === currentProfileId);
  const item = sessionQueue.shift(); // take the current card out of the front of the queue
  const prog = p.progress[item.id] || { score: 0 };
  sessionAnswers++;
  item.attempts = (item.attempts || 0) + 1;
  if (knew) {
    prog.score = Math.min(3, prog.score + 1);
    sessionCorrect++;
  } else {
    prog.score = 0;
  }
  p.progress[item.id] = prog;
  item.score = prog.score;
  p.totalReviews = (p.totalReviews || 0) + 1;
  updateStreak(p);
  saveState();

  if (prog.score >= 3) {
    // mastered — remove from this session's rotation for good
    sessionMasterCount++;
  } else if (item.attempts >= MAX_ATTEMPTS_PER_WORD) {
    // tried enough times this round without mastering it — defer to a future
    // session rather than blocking this one forever; its partial score is
    // already saved, so it'll come up again (and sooner, since its score is low)
    sessionDeferredCount++;
  } else {
    // not yet mastered — put it back a few cards later in the same session
    // so it's reviewed again shortly (sooner if the answer was wrong)
    const gap = knew ? (3 + prog.score) : 1;
    const insertPos = Math.min(sessionQueue.length, gap);
    sessionQueue.splice(insertPos, 0, item);
  }
  showCurrentCard();
}
function updateStreak(p) {
  const today = todayStr();
  if (p.lastPracticeDate === today) return;
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate()-1);
  const yStr = yesterday.getFullYear()+"-"+(yesterday.getMonth()+1)+"-"+yesterday.getDate();
  if (p.lastPracticeDate === yStr) {
    p.streak = (p.streak||0) + 1;
  } else {
    p.streak = 1;
  }
  p.lastPracticeDate = today;
}
function finishSession() {
  const p = state.profiles.find(x => x.id === currentProfileId);
  if (p && sessionTotalUnique > 0) {
    if (!p.history) p.history = [];
    const now = new Date();
    p.history.unshift({
      dateLabel: now.toLocaleDateString("ru-RU", { day: "2-digit", month: "2-digit", year: "numeric" }),
      timeLabel: now.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" }),
      levelKey: currentLevel,
      levelTitle: DECKS[currentLevel].title,
      total: sessionTotalUnique,
      correct: sessionMasterCount
    });
    if (p.history.length > 200) p.history = p.history.slice(0, 200); // keep history from growing unbounded
    saveState();
  }
  goTo("screen-done");
  let summary = `Вы выучили ${sessionMasterCount} из ${sessionTotalUnique} слов за это занятие 🎉`;
  if (sessionDeferredCount > 0) {
    summary += ` (${sessionDeferredCount} ${sessionDeferredCount === 1 ? "слово" : "слов"} оказались сложными — вернутся в следующий раз)`;
  }
  document.getElementById("done-summary").textContent = summary;
}

/* ---------------- HISTORY ---------------- */
function renderHistory() {
  const p = state.profiles.find(x => x.id === currentProfileId);
  const container = document.getElementById("history-list");
  container.innerHTML = "";
  if (!p || !p.history || p.history.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="big">🕒</div>Пока нет завершённых занятий.<br>Пройдите хотя бы одну карточку!</div>`;
    return;
  }
  const summary = document.createElement("div");
  summary.className = "stat-row";
  summary.innerHTML = `
    <div class="stat-box"><div class="stat-num">${p.totalReviews || 0}</div><div class="stat-label">повторений всего</div></div>
    <div class="stat-box"><div class="stat-num">${p.history.length}</div><div class="stat-label">занятий пройдено</div></div>
  `;
  container.appendChild(summary);
  p.history.forEach(h => {
    const item = document.createElement("div");
    item.className = "history-item";
    item.innerHTML = `
      <div>
        <div class="history-date">${h.dateLabel} · ${h.timeLabel}</div>
        <div class="history-level">${escapeHtml(h.levelTitle)}</div>
      </div>
      <div class="history-score">${h.correct}/${h.total} ✅</div>
    `;
    container.appendChild(item);
  });
}

/* ---------------- LEARNED WORDS ---------------- */
function renderLearnedWords() {
  const p = state.profiles.find(x => x.id === currentProfileId);
  const container = document.getElementById("learned-list");
  container.innerHTML = "";
  if (!p) return;
  let totalLearned = 0;
  LEVEL_ORDER.forEach(key => {
    const deck = DECKS[key];
    const learnedWords = [];
    deck.words.forEach((w, i) => {
      const id = key + "_" + i;
      if (p.progress[id] && p.progress[id].score >= 3) learnedWords.push(w);
    });
    if (learnedWords.length === 0) return;
    totalLearned += learnedWords.length;
    const group = document.createElement("div");
    group.className = "learned-group";
    const rows = learnedWords.map(w => `
      <div class="learned-word-row">
        <span class="learned-word-en">${escapeHtml(w[0])}</span>
        <span class="learned-word-ru">${escapeHtml(w[1])}</span>
      </div>
    `).join("");
    group.innerHTML = `<div class="learned-group-title">${escapeHtml(deck.title)} (${learnedWords.length})</div>${rows}`;
    container.appendChild(group);
  });
  if (totalLearned === 0) {
    container.innerHTML = `<div class="empty-state"><div class="big">📖</div>Пока нет выученных слов.<br>Отвечайте "Знаю" три раза подряд, чтобы слово попало сюда.</div>`;
  }
}

/* ---------------- NOTIFICATION SETTINGS ---------------- */
function renderNotifSettings() {
  renderNotifPermissionBox();
  renderNotifTimesList();
  renderOneSignalDebugBox();
  document.getElementById("notif-save-note").style.display = "none";
}
// Diagnostic panel: shows the exact state OneSignal and the browser see on
// THIS device, right inside the app, so a screenshot of this box is enough
// to diagnose "0 recipients" without needing a computer or dev tools.
async function renderOneSignalDebugBox() {
  const box = document.getElementById("onesignal-debug-box");
  if (!box) return;
  box.innerHTML = "Загрузка диагностики…";

  const lines = [];
  lines.push(`🌐 Адрес страницы: ${location.href}`);
  lines.push(`📱 Установлено на экран "Домой": ${window.matchMedia("(display-mode: standalone)").matches ? "Да ✅" : "Нет ❌ (это ключевая причина, если уведомления не приходят!)"}`);
  lines.push(`🔔 Разрешение браузера: ${("Notification" in window) ? Notification.permission : "нет API"}`);

  try {
    if ("serviceWorker" in navigator) {
      const reg = await navigator.serviceWorker.getRegistration();
      if (reg) {
        const active = reg.active;
        lines.push(`⚙️ Service Worker: зарегистрирован, файл: ${active ? active.scriptURL : "(ещё активируется)"}`);
      } else {
        lines.push(`⚙️ Service Worker: НЕ зарегистрирован ❌`);
      }
    }
  } catch (e) {
    lines.push(`⚙️ Service Worker: ошибка проверки (${e.message})`);
  }

  box.innerHTML = lines.map(l => l.replace(/</g, "&lt;")).join("<br>") + "<br>🔄 Проверяю OneSignal…";

  if (window.OneSignalDeferred) {
    window.OneSignalDeferred.push(async function (OneSignal) {
      const osLines = [];
      try {
        const sub = OneSignal.User.PushSubscription;
        osLines.push(`🆔 OneSignal Subscription ID: ${sub.id || "ОТСУТСТВУЕТ ❌ (устройство не подписано — вот причина 0 получателей)"}`);
        osLines.push(`✅ Подписан (optedIn): ${sub.optedIn === true ? "Да" : "Нет ❌"}`);
        osLines.push(`🔑 Push token есть: ${sub.token ? "Да" : "Нет ❌"}`);
      } catch (e) {
        osLines.push(`OneSignal ошибка: ${e.message}`);
      }
      box.innerHTML = lines.map(l => l.replace(/</g, "&lt;")).join("<br>") + "<br>" + osLines.map(l => l.replace(/</g, "&lt;")).join("<br>");
    });
  } else {
    box.innerHTML = lines.map(l => l.replace(/</g, "&lt;")).join("<br>") + "<br>❌ OneSignal SDK не загрузился (нет интернета или заблокирован скрипт).";
  }
}
function renderNotifPermissionBox() {
  const box = document.getElementById("notif-permission-box");
  const supported = "Notification" in window;
  if (!supported) {
    box.textContent = "Этот браузер не поддерживает уведомления.";
    return;
  }
  const perm = Notification.permission;
  if (perm === "granted") {
    box.innerHTML = `✅ Разрешение на уведомления получено на этом устройстве.`;
  } else if (perm === "denied") {
    box.innerHTML = `🚫 Уведомления заблокированы в настройках браузера — включите их вручную в настройках телефона, чтобы получать слова.`;
  } else {
    box.innerHTML = `Разрешение на уведомления ещё не запрошено.<br><button class="btn secondary" style="margin-top:8px;padding:10px;" onclick="requestNotifPermission()">🔔 Разрешить уведомления</button>`;
  }
}
function requestNotifPermission() {
  // Prefer OneSignal's own prompt when its SDK is loaded, since that's what
  // registers this device as a real, targetable push subscription on
  // OneSignal's side (needed for notifications to arrive when the app is
  // fully closed). Falls back to the plain browser prompt otherwise.
  if (window.OneSignalDeferred) {
    window.OneSignalDeferred.push(async function (OneSignal) {
      try {
        await OneSignal.Notifications.requestPermission();
      } catch (e) {
        console.warn("OneSignal permission request failed:", e);
      }
      renderNotifPermissionBox();
    });
    return;
  }
  if (!("Notification" in window)) return;
  Notification.requestPermission().then(() => renderNotifPermissionBox());
}
function getRandomWordForNotification() {
  const key = LEVEL_ORDER[Math.floor(Math.random() * LEVEL_ORDER.length)];
  const words = DECKS[key].words;
  return words[Math.floor(Math.random() * words.length)];
}
async function sendTestNotification() {
  const resultEl = document.getElementById("notif-test-result");
  resultEl.style.display = "block";
  resultEl.style.color = "var(--danger)";

  if (!("Notification" in window)) {
    resultEl.textContent = "❌ Этот браузер не поддерживает уведомления.";
    return;
  }
  if (Notification.permission !== "granted") {
    resultEl.textContent = "⚠️ Сначала нажмите «Разрешить уведомления» выше.";
    return;
  }
  if (!("serviceWorker" in navigator)) {
    resultEl.textContent = "❌ Service worker не поддерживается — возможно, сайт открыт не через https/установленное приложение.";
    return;
  }
  try {
    // navigator.serviceWorker.ready never resolves if the site was opened
    // as a plain local file (file://) instead of a real https:// host —
    // guard with a timeout so the button gives useful feedback either way.
    const reg = await Promise.race([
      navigator.serviceWorker.ready,
      new Promise((_, reject) => setTimeout(() => reject(new Error("таймаут — service worker не готов. Сайт должен быть открыт через https (не как локальный файл).")), 4000))
    ]);
    const [en, ru] = getRandomWordForNotification();
    await reg.showNotification("English for Family 📚", {
      body: `${en} — ${ru}`,
      icon: "./icon-192.png",
      badge: "./icon-192.png",
      tag: "ef-test-notification"
    });
    resultEl.style.color = "var(--accent2)";
    resultEl.textContent = "✅ Отправлено — проверьте экран телефона!";
  } catch (err) {
    resultEl.textContent = "❌ Не получилось: " + err.message;
  }
}
function renderNotifTimesList() {
  const list = document.getElementById("notif-times-list");
  list.innerHTML = "";
  state.notifTimes.forEach((time, i) => {
    const row = document.createElement("div");
    row.style.cssText = "display:flex; gap:10px; align-items:center;";
    row.innerHTML = `
      <input type="time" value="${time}" style="flex:1; padding:12px; border-radius:12px; border:1px solid #334155; background:var(--card2); color:var(--text); font-size:16px;"
        onchange="state.notifTimes[${i}] = this.value;">
      <button class="icon-btn" onclick="removeNotifTime(${i})">✕</button>
    `;
    list.appendChild(row);
  });
  if (state.notifTimes.length === 0) {
    list.innerHTML = `<div class="empty-state" style="margin-top:0;">Расписание пусто — добавьте хотя бы одно время.</div>`;
  }
}
function addNotifTime() {
  state.notifTimes.push("10:00");
  renderNotifTimesList();
}
function removeNotifTime(i) {
  state.notifTimes.splice(i, 1);
  renderNotifTimesList();
}
function saveNotifTimes() {
  state.notifTimes = [...new Set(state.notifTimes)].sort();
  saveState();
  renderNotifTimesList();
  const note = document.getElementById("notif-save-note");
  note.style.display = "block";
  setTimeout(() => { note.style.display = "none"; }, 2500);
}

/* ---------------- UTIL ---------------- */
function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

/* ---------------- INIT ---------------- */
renderProfiles();

// Show a one-time hint on iPhone/iPad telling users how to add the app to
// their home screen — required on iOS before notifications can work at all.
(function showIosInstallHintIfNeeded() {
  const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true || window.matchMedia("(display-mode: standalone)").matches;
  const hidden = localStorage.getItem("efHideIosBanner") === "1";
  if (isIos && !isStandalone && !hidden) {
    document.getElementById("ios-install-banner").style.display = "block";
  }
})();

// Register the service worker so the app can be installed on the home
// screen and (once OneSignal is configured) receive push notifications.
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch((err) => {
      console.warn("Service worker registration failed:", err);
    });
  });
}

/* ---------------- LOCAL REMINDER TIMER (no server needed) ---------------- */
// While the app is open (foreground or recently backgrounded), this checks
// every 20s whether the clock matches one of the configured reminder times
// and, if so, fires a local notification with a fresh, not-yet-shown word.
// This is best-effort: iOS suspends JS in fully-closed/backgrounded tabs,
// so it won't fire while the app has been closed for a while — for
// guaranteed delivery even when fully closed, OneSignal is still needed.
function checkReminderTime() {
  if (!("Notification" in window) || Notification.permission !== "granted") return;
  if (!state.notifTimes || state.notifTimes.length === 0) return;
  const now = new Date();
  const nowHM = String(now.getHours()).padStart(2, "0") + ":" + String(now.getMinutes()).padStart(2, "0");
  if (!state.notifTimes.includes(nowHM)) return;
  const fireKey = todayStr() + " " + nowHM;
  if (state.lastReminderFireKey === fireKey) return; // already fired this exact slot today
  state.lastReminderFireKey = fireKey;
  saveState();
  fireReminderNotification();
}
async function fireReminderNotification() {
  const profileId = state.lastActiveProfileId || (state.profiles[0] && state.profiles[0].id);
  const p = state.profiles.find(x => x.id === profileId);
  if (!p) return;
  const picked = getNextReminderWord(p);
  if (!picked) return; // this profile has mastered everything
  const [en, ru] = picked.word;
  try {
    if (!("serviceWorker" in navigator)) return;
    // guard against navigator.serviceWorker.ready never resolving (e.g. no
    // https / service worker unsupported) so this can't pile up forever
    const reg = await Promise.race([
      navigator.serviceWorker.ready,
      new Promise((_, reject) => setTimeout(() => reject(new Error("service worker not ready")), 4000))
    ]);
    reg.showNotification("English for Family 📚", {
      body: `${en} — ${ru}`,
      icon: "./icon-192.png",
      badge: "./icon-192.png",
      tag: "ef-reminder-" + Date.now()
    });
  } catch (e) {
    console.warn("Reminder notification failed:", e);
  }
}
setInterval(checkReminderTime, 20000);
checkReminderTime(); // also check immediately in case the app was opened right on a scheduled minute
</script>
</body>
</html>
