<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>English for Family — учим слова вместе</title>

<!-- PWA / "Add to Home Screen" support -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0f172a">

<!-- iOS-specific: makes the site behave like an installed app once added to Home Screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EF Family">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">

<!-- OneSignal push notifications (app: English for Family, https://polite-crepe-23d27d.netlify.app/) -->
<script defer src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "01d59c44-6615-49b8-9a76-d208584e7c35",
      serviceWorkerPath: "service-worker.js",
    });
  });
</script>

<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --card2: #16213a;
    --accent: #6366f1;
    --accent2: #22c55e;
    --danger: #f97316;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --radius: 18px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: linear-gradient(160deg, #0f172a, #1e1b4b 60%, #0f172a);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overscroll-behavior-y: none;
  }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; padding: 16px; }
  .screen { display: none; flex-direction: column; flex: 1; animation: fadeIn .25s ease; }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: translateY(0);} }

  h1 { font-size: 22px; margin: 4px 0 2px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 18px; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .icon-btn {
    background: var(--card); border: none; color: var(--text); width: 40px; height: 40px;
    border-radius: 12px; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .icon-btn:active { transform: scale(0.95); }

  .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 8px; }
  .profile-card {
    background: var(--card); border-radius: var(--radius); padding: 18px 12px; text-align: center; cursor: pointer;
    border: 2px solid transparent; transition: border-color .15s, transform .1s;
  }
  .profile-card:active { transform: scale(0.97); }
  .avatar {
    width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center;
    justify-content: center; font-size: 22px; font-weight: 700; color: #0f172a;
  }
  .profile-name { font-weight: 600; font-size: 15px; }
  .profile-meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .add-card { border: 2px dashed #334155; background: transparent; display: flex; align-items: center; justify-content: center; flex-direction: column; color: var(--muted); }

  .btn {
    background: var(--accent); color: white; border: none; border-radius: 14px; padding: 14px 18px;
    font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px;
  }
  .btn:active { transform: scale(0.98); }
  .btn.secondary { background: var(--card); color: var(--text); }
  .btn.ghost { background: transparent; color: var(--muted); border: 1px solid #334155; }
  .btn.success { background: var(--accent2); }
  .btn.danger { background: var(--danger); }
  .btn-row { display: flex; gap: 10px; }
  .btn-row .btn { margin-top: 0; }

  input[type=text] {
    width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: var(--card2);
    color: var(--text); font-size: 16px; margin-top: 10px;
  }
  .color-row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .color-dot { width: 34px; height: 34px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
  .color-dot.selected { border-color: white; }

  .level-list { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
  .level-card {
    background: var(--card); border-radius: var(--radius); padding: 16px; display: flex; align-items: center;
    justify-content: space-between; cursor: pointer; border: 2px solid transparent;
  }
  .level-card.active-level { border-color: var(--accent); }
  .level-title { font-weight: 700; font-size: 16px; }
  .level-sub { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .progress-bar-bg { width: 100%; height: 8px; background: #334155; border-radius: 6px; margin-top: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent2); border-radius: 6px; transition: width .3s; }

  .stat-row { display: flex; gap: 10px; margin: 14px 0; }
  .stat-box { flex: 1; background: var(--card); border-radius: 14px; padding: 12px; text-align: center; }
  .stat-num { font-size: 20px; font-weight: 800; }
  .stat-label { color: var(--muted); font-size: 11px; margin-top: 2px; }

  .card-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; }
  .flashcard {
    width: 100%; max-width: 380px; min-height: 260px; background: var(--card);
    border-radius: 22px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; cursor: pointer; text-align: center; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,.35);
  }
  .flash-word { font-size: 32px; font-weight: 800; }
  .flash-hint { color: var(--muted); font-size: 13px; margin-top: 14px; }
  .flash-translation { font-size: 24px; font-weight: 700; color: var(--accent2); margin-top: 10px; }
  .flash-example { color: var(--muted); font-size: 14px; margin-top: 14px; line-height: 1.4; }
  .badge {
    position: absolute; top: 14px; left: 14px; background: #334155; color: var(--muted); font-size: 11px;
    padding: 4px 10px; border-radius: 20px;
  }

  .review-actions { display: flex; gap: 10px; margin-top: 18px; width: 100%; max-width: 380px; }
  .review-actions .btn { padding: 16px; font-size: 15px; }

  .session-progress { color: var(--muted); font-size: 13px; text-align: center; margin-top: 10px; }

  .empty-state { text-align: center; color: var(--muted); margin-top: 40px; padding: 0 20px; }
  .empty-state .big { font-size: 40px; margin-bottom: 10px; }

  .done-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .done-emoji { font-size: 56px; margin-bottom: 12px; }

  .history-item {
    background: var(--card); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .history-date { font-size: 13px; color: var(--muted); }
  .history-level { font-weight: 600; font-size: 14px; margin-top: 2px; }
  .history-score { font-weight: 700; font-size: 15px; color: var(--accent2); white-space: nowrap; margin-left: 10px; }

  .learned-group { margin-bottom: 18px; }
  .learned-group-title {
    font-weight: 700; font-size: 14px; color: var(--muted); margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .learned-word-row {
    display: flex; justify-content: space-between; background: var(--card); border-radius: 10px;
    padding: 10px 14px; margin-bottom: 6px; font-size: 14px;
  }
  .learned-word-en { font-weight: 600; }
  .learned-word-ru { color: var(--muted); }

  footer.hint { text-align: center; color: #475569; font-size: 11px; margin-top: auto; padding-top: 20px; }
</style>
</head>
<body>
<div id="app">

  <!-- PROFILES SCREEN -->
  <div class="screen active" id="screen-profiles">
    <h1>👨‍👩‍👧‍👦 English for Family</h1>
    <div class="subtitle">Выберите, кто занимается</div>
    <div id="ios-install-banner" style="display:none; background:var(--card); border-radius:14px; padding:14px; margin-bottom:16px; font-size:13px; color:var(--muted); line-height:1.5;">
      📲 Чтобы получать уведомления, добавьте приложение на экран "Домой": нажмите значок "Поделиться" внизу браузера, затем "На экран «Домой»".
      <button class="btn ghost" style="margin-top:8px; padding:8px;" onclick="document.getElementById('ios-install-banner').style.display='none'; localStorage.setItem('efHideIosBanner','1');">Понятно, скрыть</button>
    </div>
    <div class="profile-grid" id="profile-grid"></div>
    <button class="btn ghost" style="margin-top:6px;" onclick="goTo('screen-notif-settings')">🔔 Настройка уведомлений</button>
    <footer class="hint">Учим английские слова всей семьёй — каждый в своём темпе</footer>
  </div>

  <!-- NOTIFICATION SETTINGS SCREEN -->
  <div class="screen" id="screen-notif-settings">
    <div class="top-bar">
      <button class="icon-btn" onclick="goTo('screen-profiles')">←</button>
      <h1 style="margin:0;font-size:18px;">Уведомления</h1>
      <div style="width:40px;"></div>
    </div>
    <div class="subtitle">Во сколько присылать новое слово? Можно добавить несколько времён в день.</div>
    <div id="notif-permission-box" style="background:var(--card); border-radius:14px; padding:14px; margin-bottom:10px; font-size:13px; color:var(--muted);"></div>
    <button class="btn secondary" onclick="sendTestNotification()">🧪 Отправить тестовое уведомление сейчас</button>
    <div id="notif-test-result" style="text-align:center; font-size:13px; margin-top:8px; display:none;"></div>
    <div id="onesignal-debug-box" style="background:var(--card2); border-radius:14px; padding:14px; margin-top:14px; font-size:12px; color:var(--muted); line-height:1.6; word-break:break-all;"></div>
    <button class="btn ghost" style="margin-top:8px;" onclick="renderOneSignalDebugBox()">🔄 Обновить диагностику</button>
    <div style="color:var(--muted); font-size:12px; margin:10px 0 16px; line-height:1.5;">
      Тестовое уведомление проверяет, что разрешения и установка приложения настроены правильно на этом телефоне — оно приходит мгновенно с самого устройства, без сервера.
    </div>
    <div id="notif-times-list" style="display:flex; flex-direction:column; gap:10px; margin-bottom:14px;"></div>
    <button class="btn secondary" onclick="addNotifTime()">➕ Добавить время</button>
    <button class="btn" onclick="saveNotifTimes()">Сохранить расписание</button>
    <div id="notif-save-note" style="text-align:center; color:var(--accent2); font-size:13px; margin-top:10px; display:none;">Сохранено ✅</div>
    <div style="color:var(--muted); font-size:12px; margin-top:20px; line-height:1.5;">
      ℹ️ Пока приложение установлено и открыто (хотя бы недавно было на экране), оно само присылает уведомление с новым словом в указанное время — сервер и OneSignal для этого не нужны. Ограничение: если телефон был выключен или приложение не открывалось долго, iPhone может "усыпить" его, и уведомление в этот раз не придёт — просто откройте приложение, и на главном экране появится актуальное "Слово дня". Для 100%-надёжной доставки даже при полностью закрытом приложении нужен OneSignal.
    </div>
  </div>

  <!-- ADD PROFILE SCREEN -->
  <div class="screen" id="screen-add-profile">
    <div class="top-bar">
      <button class="icon-btn" onclick="goTo('screen-profiles')">←</button>
      <h1 style="margin:0;font-size:18px;">Новый профиль</h1>
      <div style="width:40px;"></div>
    </div>
    <input type="text" id="new-profile-name" placeholder="Имя (например, Мама, Алия, Дима)" maxlength="20">
    <div class="color-row" id="color-row"></div>
    <button class="btn" onclick="createProfile()">Создать профиль</button>
  </div>

  <!-- LEVELS SCREEN -->
  <div class="screen" id="screen-levels">
    <div class="top-bar">
      <button class="icon-btn" onclick="goTo('screen-profiles')">←</button>
      <h1 style="margin:0;font-size:18px;" id="levels-title">Уровень</h1>
      <button class="icon-btn" onclick="deleteCurrentProfile()">🗑</button>
    </div>
    <div id="word-of-day-box" style="display:none; background:linear-gradient(135deg, var(--accent), #8b5cf6); border-radius:16px; padding:14px 16px; margin-bottom:14px;"></div>
    <div class="stat-row" id="levels-stats"></div>
    <div class="btn-row" style="margin-bottom:14px;">
      <button class="btn ghost" onclick="goTo('screen-history')">🕒 История занятий</button>
      <button class="btn ghost" onclick="goTo('screen-learned')">📖 Выученные слова</button>
    </div>
    <div class="level-list" id="level-list"></div>
  </div>

  <!-- HISTORY SCREEN -->
  <div class="screen" id="screen-history">
    <div class="top-bar">
      <button class="icon-btn" onclick="goTo('screen-levels')">←</button>
      <h1 style="margin:0;font-size:18px;">История занятий</h1>
      <div style="width:40px;"></div>
    </div>
    <div id="history-list" style="overflow-y:auto;"></div>
  </div>

  <!-- LEARNED WORDS SCREEN -->
  <div class="screen" id="screen-learned">
    <div class="top-bar">
      <button class="icon-btn" onclick="goTo('screen-levels')">←</button>
      <h1 style="margin:0;font-size:18px;">Выученные слова</h1>
      <div style="width:40px;"></div>
    </div>
    <div id="learned-list" style="overflow-y:auto;"></div>
  </div>

  <!-- FLASHCARD SCREEN -->
  <div class="screen" id="screen-cards">
    <div class="top-bar">
      <button class="icon-btn" onclick="goTo('screen-levels')">←</button>
      <div class="session-progress" id="session-progress-top" style="margin:0;"></div>
      <div style="width:40px;"></div>
    </div>
    <div class="card-area">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="badge" id="flash-badge"></div>
        <div class="flash-word" id="flash-word">word</div>
        <div class="flash-hint" id="flash-hint">Нажмите, чтобы увидеть перевод</div>
        <div class="flash-translation" id="flash-translation" style="display:none;"></div>
        <div class="flash-example" id="flash-example" style="display:none;"></div>
        <div class="flash-hint" id="flash-hint-next" style="display:none;">Нажмите на слово, чтобы перейти дальше →</div>
      </div>
      <div class="review-actions" id="review-actions" style="display:none;">
        <button class="btn danger" onclick="event.stopPropagation(); answerCard(false)">😕 Повторить</button>
      </div>
    </div>
  </div>

  <!-- DONE SCREEN -->
  <div class="screen" id="screen-done">
    <div class="done-screen">
      <div class="done-emoji">🎉</div>
      <h1>Отлично!</h1>
      <div class="subtitle" id="done-summary">Вы повторили все слова на сегодня</div>
      <button class="btn" onclick="goTo('screen-levels')">К уровням</button>
      <button class="btn secondary" onclick="goTo('screen-profiles')">К профилям</button>
    </div>
  </div>

</div>

<script>
/* ---------------- DATA: vocabulary decks ---------------- */
const DECKS = {
  a1: {
    title: "Начальный (A1)",
    sub: "Базовые слова на каждый день",
    words: [
      ["hello","привет","Hello! How are you?","Привет! Как дела?"],
      ["goodbye","до свидания","Goodbye, see you tomorrow.","До свидания, увидимся завтра."],
      ["please","пожалуйста","Please, help me.","Пожалуйста, помоги мне."],
      ["thank you","спасибо","Thank you very much.","Большое спасибо."],
      ["yes","да","Yes, I agree.","Да, я согласен."],
      ["no","нет","No, thank you.","Нет, спасибо."],
      ["water","вода","I want a glass of water.","Я хочу стакан воды."],
      ["food","еда","The food is delicious.","Еда очень вкусная."],
      ["house","дом","We live in a big house.","Мы живём в большом доме."],
      ["family","семья","I love my family.","Я люблю свою семью."],
      ["mother","мама","My mother is a doctor.","Моя мама — врач."],
      ["father","папа","My father works a lot.","Мой папа много работает."],
      ["sister","сестра","My sister is younger than me.","Моя сестра младше меня."],
      ["brother","брат","My brother plays football.","Мой брат играет в футбол."],
      ["friend","друг","He is my best friend.","Он мой лучший друг."],
      ["school","школа","The children go to school.","Дети ходят в школу."],
      ["book","книга","I am reading a new book.","Я читаю новую книгу."],
      ["table","стол","Put the plate on the table.","Поставь тарелку на стол."],
      ["chair","стул","Sit on this chair.","Сядь на этот стул."],
      ["door","дверь","Please close the door.","Пожалуйста, закрой дверь."],
      ["window","окно","Open the window, it's hot.","Открой окно, жарко."],
      ["car","машина","We travel by car.","Мы путешествуем на машине."],
      ["dog","собака","The dog is very friendly.","Собака очень дружелюбная."],
      ["cat","кошка","The cat is sleeping.","Кошка спит."],
      ["red","красный","She has a red dress.","У неё красное платье."],
      ["blue","синий","The sky is blue today.","Небо сегодня синее."],
      ["big","большой","This is a big city.","Это большой город."],
      ["small","маленький","It's a small problem.","Это маленькая проблема."],
      ["happy","счастливый","I am happy today.","Я сегодня счастлив."],
      ["sad","грустный","Why are you sad?","Почему ты грустишь?"],
      ["eat","есть (кушать)","Let's eat dinner together.","Давайте поужинаем вместе."],
      ["drink","пить","Drink more water every day.","Пей больше воды каждый день."],
      ["sleep","спать","Children need to sleep well.","Детям нужно хорошо спать."],
      ["run","бегать","He runs every morning.","Он бегает каждое утро."],
      ["walk","ходить пешком","We walked to the park.","Мы пошли пешком в парк."],
      ["see","видеть","I can see the mountains.","Я вижу горы."],
      ["hear","слышать","Can you hear the music?","Ты слышишь музыку?"],
      ["love","любить","I love learning English.","Я люблю учить английский."],
      ["work","работать","She works in a hospital.","Она работает в больнице."],
      ["play","играть","The kids play in the yard.","Дети играют во дворе."]
    ]
  },
  a2b1: {
    title: "Средний (A2–B1)",
    sub: "Слова для повседневного общения",
    words: [
      ["weather","погода","The weather is nice today.","Сегодня хорошая погода."],
      ["journey","путешествие","We had a long journey.","У нас было долгое путешествие."],
      ["environment","окружающая среда","We must protect the environment.","Мы должны защищать окружающую среду."],
      ["decision","решение","It was a difficult decision.","Это было трудное решение."],
      ["opportunity","возможность","This is a great opportunity.","Это отличная возможность."],
      ["experience","опыт","She has a lot of experience.","У неё большой опыт."],
      ["achieve","достигать","We achieved our goal.","Мы достигли своей цели."],
      ["improve","улучшать","I want to improve my English.","Я хочу улучшить свой английский."],
      ["suggest","предлагать","I suggest we leave early.","Я предлагаю выехать пораньше."],
      ["describe","описывать","Can you describe the picture?","Можешь описать картинку?"],
      ["communicate","общаться","We communicate every day.","Мы общаемся каждый день."],
      ["imagine","воображать","Imagine a better future.","Представь лучшее будущее."],
      ["discover","открывать (узнавать)","Scientists discovered a new planet.","Учёные открыли новую планету."],
      ["explain","объяснять","Please explain the rules.","Пожалуйста, объясни правила."],
      ["compare","сравнивать","Let's compare the two options.","Давай сравним два варианта."],
      ["prefer","предпочитать","I prefer tea to coffee.","Я предпочитаю чай кофе."],
      ["avoid","избегать","Try to avoid stress.","Постарайся избегать стресса."],
      ["encourage","поощрять, подбадривать","Parents should encourage children.","Родители должны поддерживать детей."],
      ["complain","жаловаться","He complains about everything.","Он жалуется на всё."],
      ["apologize","извиняться","I want to apologize for being late.","Я хочу извиниться за опоздание."],
      ["advantage","преимущество","This has many advantages.","У этого много преимуществ."],
      ["disadvantage","недостаток","Every choice has a disadvantage.","У каждого выбора есть недостаток."],
      ["responsible","ответственный","She is responsible for the project.","Она отвечает за проект."],
      ["confident","уверенный","He feels confident about the exam.","Он уверен в экзамене."],
      ["curious","любопытный","Children are naturally curious.","Дети от природы любопытны."],
      ["patient","терпеливый","Be patient with your kids.","Будь терпелив со своими детьми."],
      ["generous","щедрый","He is very generous.","Он очень щедрый."],
