# Runs the "send-word-notification" function on a schedule (Netlify Scheduled
# Functions — free on all plans). Cron times below are in UTC.
# Configured for UTC+5 (matches user's local time) — sends at 09:00, 12:00,
# 15:00, 18:00, 21:00 local time.
[functions."send-word-notification"]
  schedule = "0 4,7,10,13,16 * * *"
